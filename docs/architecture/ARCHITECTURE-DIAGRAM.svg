  <text x="668" y="509" class="box-item">Approval Gates: Auto-approve (low risk)  ·  Owner approval (high impact)</text>
  <text x="668" y="523" class="box-item">State Machine: Pending → Running → Completed / Failed / Compensated</text>

  <text x="656" y="548" fill="rgba(255,255,255,0.25)" font-size="10" font-family="monospace">✕ Zero hardcoded business logic  ·  All intelligence fetched from MCP at runtime</text>

