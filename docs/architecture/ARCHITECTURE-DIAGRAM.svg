  <text x="986" y="421" class="box-item">Feature Flags</text>
  <text x="986" y="435" class="box-item">Versioning</text>

  <rect x="656" y="450" width="468" height="92" fill="#151518" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
