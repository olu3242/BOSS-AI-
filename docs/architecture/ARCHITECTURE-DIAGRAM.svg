<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <defs>
    <style>
      text { font-family: 'Courier New', monospace; }
      .title { font-size: 28px; font-weight: bold; fill: #F2F2F4; }
      .subtitle { font-size: 13px; fill: #6B6B78; letter-spacing: 3px; }
      .box-title { font-size: 14px; font-weight: bold; fill: #F2F2F4; }
      .box-label { font-size: 9px; fill: #C8102E; letter-spacing: 2px; }
      .box-item { font-size: 11px; fill: #9898A6; }
      .box-item-bright { font-size: 11px; fill: #F2F2F4; }
      .layer-label { font-size: 10px; fill: #6B6B78; letter-spacing: 2px; }
      .law-text { font-size: 11px; fill: #C8102E; }
      .connector { stroke: #C8102E; stroke-width: 1.5; fill: none; stroke-dasharray: 4,3; }
      .connector-solid { stroke: rgba(200,16,46,0.3); stroke-width: 1; fill: none; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C8102E"/>
    </marker>
