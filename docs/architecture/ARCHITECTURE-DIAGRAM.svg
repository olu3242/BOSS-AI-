  <text x="76" y="166" class="box-item-bright">Next.js 14 App Router</text>
  <text x="76" y="180" class="box-item">TypeScript · Tailwind · shadcn/ui</text>

  <rect x="340" y="130" width="260" height="64" fill="#0F0F11" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
